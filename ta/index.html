<!doctype html>
<html lang="ja">
 <head>
  <link rel="stylesheet" href="style.css">
  <meta charset="utf-8">
  <title>文字の配置 [text-align]</title>
 </head>

 <body>
  <h1>文字の配置 [text-align]</h1>
  <p class="left">左揃えの文章</p>
  <p class="center">中央揃えの文章</p>
  <p class="right">右揃えの文章</p>
  <p class="justify">この段落は両端揃えで表示されます。文章の左端と右端が揃うように、<br>ブラウザが文字間や単語間を自動で調整します。
  両端揃えは雑誌や新聞、論文などの紙媒体のレイアウトでもよく使われ、<br>整然とした印象を与える効果があります。
  Webデザインにおいては、視認性を重視する場合に注意が必要ですが、<br>長文においては整列効果が発揮されます。</p>
  <!-- 画像の調整 -->
   <div>
    <img src="quarog.png" alt="地震情報受信ソフトウェア Quarog" width="512">
   </div>
 </body>

</html>
